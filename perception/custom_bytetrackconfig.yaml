# BoTSORT tracker configuration for mode="track"
# Docs: https://docs.ultralytics.com/modes/track/

tracker_type: botsort # (str) Tracker backend: botsort|bytetrack
track_high_thresh: 0.5 # (float) First-stage match threshold; raise for cleaner tracks, lower to keep more
track_low_thresh: 0.1 # (float) Second-stage threshold for low-score matches; balances recovery vs drift
new_track_thresh: 0.5 # (float) Start a new track if no match ≥ this; higher reduces false tracks
track_buffer: 400 # (int) Frames to keep lost tracks alive; higher handles occlusion, increases ID switches risk
match_thresh: 0.8 # (float) Association similarity threshold (IoU/cost); tune with detector quality
fuse_score: True # (bool) Fuse detection score with motion/IoU for matching; stabilizes weak detections

# BoTSORT-specific parameters (required when tracker_type=botsort)
with_reid: False # (bool) Enable ReID model for appearance matching; set True for better tracking, but slower
model: osnet_x0_25_msmt17.pt # (str) ReID model path; use 'auto' for automatic download when with_reid=True
proximity_thresh: 0.5 # (float) Spatial proximity threshold for matching
appearance_thresh: 0.25 # (float) Appearance similarity threshold when with_reid=True
gmc_method: sparseOptFlow # (str) Global Motion Compensation: sparseOptFlow, orb, ecc, None